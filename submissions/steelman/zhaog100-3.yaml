miner_id: RTC-prefix-40-hex
attack:
  thesis: The Beacon Atlas API disables SSL verification for GitHub bounty sync, enabling MITM attacks that can inject fraudulent bounty data into the system.
  mechanism: The sync_bounties endpoint (beacon_api.py:516-517) creates an SSL context with check_hostname=False and verify_mode=ssl.CERT_NONE. A network attacker positioned between the node and GitHub API can intercept the HTTPS connection, present any certificate, and return forged bounty data. This allows injecting bounties with attacker-controlled reward amounts, GitHub URLs (phishing), and claimant addresses. The bounty data is then stored in the beacon_bounties SQLite table and served to all API consumers (agents, dashboards) as if it were legitimate GitHub data.
  evidence:
    - https://github.com/Scottcjn/Rustchain/blob/main/node/beacon_api.py#L516
    - https://github.com/Scottcjn/Rustchain/blob/main/node/beacon_api.py#L517
    - https://github.com/Scottcjn/rustchain-bounties/pull/7364
steelman:
  thesis: The Beacon Atlas API is a demo/visualization backend that doesn't handle real funds, and the SSL-disable comment explicitly marks it as "for demo" — production would use proper TLS.
  mechanism: The code comment ctx = ssl.create_default_context() followed by ctx.check_hostname = False is explicitly labeled "for demo" in the source. The beacon_api module is a Flask Blueprint for 3D visualization, not a financial endpoint. Bounty data synced from GitHub is informational only — actual bounty claims are processed through the RustChain on-chain system, not this API. The complete_bounty endpoint correctly requires X-Admin-Key with hmac.compare_digest, showing security awareness where it matters.
  evidence:
    - https://github.com/Scottcjn/Rustchain/blob/main/node/beacon_api.py#L514-L517
    - https://github.com/Scottcjn/Rustchain/blob/main/node/beacon_api.py#L672-L676
patch:
  scope: node/beacon_api.py
  diff_summary: Remove SSL verification disable; use default SSL context for GitHub API requests; add a bounty data signature verification mechanism if bounty data will be used for financial decisions.
  link_or_diff: |
    --- a/node/beacon_api.py
    +++ b/node/beacon_api.py
    @@ -514,8 +514,6 @@ def sync_bounties():
         all_bounties = []
         
    -    ctx = ssl.create_default_context()
    -    ctx.check_hostname = False
    -    ctx.verify_mode = ssl.CERT_NONE
    -
         for repo in repos:
             try:
                 url = f"https://api.github.com/repos/{repo['owner']}/{repo['repo']}/issues?state=open&labels=bounty&per_page=30"
                 req = urllib.request.Request(url, headers={'Accept': 'application/vnd.github.v3+json'})
    -            with urllib.request.urlopen(req, timeout=10, context=ctx) as resp:
    +            with urllib.request.urlopen(req, timeout=10) as resp:
