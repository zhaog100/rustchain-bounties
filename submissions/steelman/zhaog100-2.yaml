miner_id: RTC-prefix-40-hex
attack:
  thesis: The cross-chain bridge has no authentication on external confirmation updates, allowing anyone to mark transfers as completed and release locked funds.
  mechanism: The /api/bridge/update-external endpoint (bridge_api.py:766) only checks authentication if RC_BRIDGE_API_KEY is set. When unset (default), the check is skipped entirely (if expected_key and api_key != expected_key). An attacker can call this endpoint with arbitrary confirmation counts, marking any pending transfer as "completed" by setting confirmations >= 12. This releases the associated lock_ledger entry, effectively freeing funds that were never actually confirmed on the external chain. Additionally, the admin key comparison uses == instead of hmac.compare_digest, enabling timing attacks to recover the admin key character-by-character.
  evidence:
    - https://github.com/Scottcjn/Rustchain/blob/main/node/bridge_api.py#L766
    - https://github.com/Scottcjn/Rustchain/blob/main/node/bridge_api.py#L694
    - https://github.com/Scottcjn/rustchain-bounties/pull/7365
steelman:
  thesis: The bridge is designed for a controlled deployment where RC_BRIDGE_API_KEY is always set in production, and the node runs behind a reverse proxy that provides an additional authentication layer.
  mechanism: The code includes an authentication check that activates when RC_BRIDGE_API_KEY is configured. In a proper production deployment, this environment variable would be set, and the bridge would only accept updates from the authorized bridge service. The bridge_transfers table has CHECK constraints on status and direction enums, preventing invalid state transitions at the database level. The lock_ledger integration ensures that funds are locked before the bridge transfer is created, preventing double-spend from the RustChain side.
  evidence:
    - https://github.com/Scottcjn/Rustchain/blob/main/node/bridge_api.py#L766-L770
    - https://github.com/Scottcjn/Rustchain/blob/main/node/bridge_api.py#L820-L835
patch:
  scope: node/bridge_api.py
  diff_summary: Require authentication on /api/bridge/update-external regardless of RC_BRIDGE_API_KEY being set; replace == with hmac.compare_digest for admin key comparison; add rate limiting on bridge initiation.
  link_or_diff: |
    --- a/node/bridge_api.py
    +++ b/node/bridge_api.py
    @@ -766,7 +766,10 @@ def update_external():
         api_key = request.headers.get("X-API-Key", "")
         expected_key = os.environ.get("RC_BRIDGE_API_KEY", "")
    -    if expected_key and api_key != expected_key:
    +    import hmac
    +    if not expected_key or not api_key:
    +        return jsonify({"error": "API key required"}), 401
    +    if not hmac.compare_digest(api_key, expected_key):
             return jsonify({"error": "Unauthorized"}), 401
    @@ -694,7 +697,7 @@ def initiate_bridge():
         admin_key = request.headers.get("X-Admin-Key", "")
    -    admin_initiated = admin_key == os.environ.get("RC_ADMIN_KEY", "")
    +    admin_initiated = hmac.compare_digest(admin_key, os.environ.get("RC_ADMIN_KEY", ""))
