name: 'RTC Reward Action'
description: 'Automatically award RTC tokens to contributors when a PR is merged'
author: 'Scottcjn (RustChain)'

branding:
  icon: 'award'
  color: 'green'

inputs:
  node-url:
    description: 'RustChain node URL (IP or hostname)'
    required: true
    default: 'https://50.28.86.131'
  amount:
    description: 'RTC amount to award per merged PR'
    required: false
    default: '5'
  wallet-from:
    description: 'Source wallet for RTC rewards'
    required: false
    default: 'project-fund'
  admin-key:
    description: 'Admin key for wallet transfer API'
    required: true
  dry-run:
    description: 'Run in dry-run mode (no actual transfer)'
    required: false
    default: 'false'
  wallet-file:
    description: 'Path to .rtc-wallet file in repo (alternative to PR body)'
    required: false
    default: '.rtc-wallet'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    NODE_URL: ${{ inputs.node-url }}
    AMOUNT: ${{ inputs.amount }}
    WALLET_FROM: ${{ inputs.wallet-from }}
    ADMIN_KEY: ${{ inputs.admin-key }}
    DRY_RUN: ${{ inputs.dry-run }}
    WALLET_FILE: ${{ inputs.wallet-file }}
    GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
    PR_NUMBER: ${{ github.event.pull_request.number }}
    REPO: ${{ github.repository }}
    PR_AUTHOR: ${{ github.event.pull_request.user.login }}
    REPO_OWNER: ${{ github.repository_owner }}
