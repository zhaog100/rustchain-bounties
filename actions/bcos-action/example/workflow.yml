name: BCOS v2 Scan
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  bcos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: BCOS Scan
        uses: zhaog100/bcos-action@v1
        with:
          tier: L1
          reviewer: bcos-ci
          anchor-on-merge: true
          admin-key: ${{ secrets.RTC_ADMIN_KEY }}
